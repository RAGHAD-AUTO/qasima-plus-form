<title>قسيمة بلس — طلب توقيع الاتفاقية</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f0f2f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .container { width: 100%; max-width: 460px; }

  .logo-wrap {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .logo-wrap svg {
    height: 48px;
    width: auto;
  }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 2rem 1.75rem 1.75rem;
    box-shadow: 0 4px 24px rgba(61,81,162,0.08);
  }
  .card-title {
    font-size: 19px;
    font-weight: 700;
    color: #3d51a2;
    margin-bottom: 6px;
    text-align: center;
  }
  .card-desc {
    font-size: 13px;
    color: #7b8ab8;
    line-height: 1.65;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .divider { border: none; border-top: 1px solid #eef0f8; margin-bottom: 1.5rem; }

  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #3d4f7a;
    margin-bottom: 6px;
  }
  .required { color: #e74c3c; margin-right: 2px; }
  .field input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border: 1.5px solid #dde3f0;
    border-radius: 10px;
    font-size: 14px;
    color: #1a2540;
    background: #fafbff;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
    direction: rtl;
  }
  .field input:focus {
    border-color: #3d51a2;
    box-shadow: 0 0 0 3px rgba(61,81,162,0.1);
    background: #fff;
  }
  .field input.error { border-color: #e74c3c; background: #fff8f8; }
  .field input::placeholder { color: #b8c0d8; }
  .field-note { font-size: 11.5px; color: #b8c0d8; margin-top: 5px; }

  .btn {
    width: 100%;
    height: 48px;
    background: #3d51a2;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn:hover { background: #2e3e85; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #a0aac8; cursor: not-allowed; }
  .btn svg { width: 17px; height: 17px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success {
    display: none;
    text-align: center;
    padding: 1.5rem 0.5rem;
  }
  .success-icon {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: #eef7ee;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .success-icon svg { width: 34px; height: 34px; fill: none; stroke: #27ae60; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .success h3 { font-size: 18px; font-weight: 700; color: #3d51a2; margin-bottom: 10px; }
  .success p { font-size: 13.5px; color: #7b8ab8; line-height: 1.75; }

  @media (max-width: 500px) {
    .card { padding: 1.5rem 1.25rem; border-radius: 14px; }
    .logo-wrap svg { height: 40px; }
  }
</style>

    <path class="cls-1" d="M574.08,257.53c6.34,0,11.23,2.29,15.28,5.41l-4.26,6.23c-3.53-2.28-7.27-3.64-11.23-3.64-5.09,0-8,2.18-8,5.51,0,4.05,4.37,5.82,10.08,7.9,7.9,2.91,14.86,6.03,14.86,14.66s-7.59,15.07-19.02,15.07c-6.75,0-12.89-2.18-17.77-6.03l3.95-6.34c4.26,2.7,8.63,4.36,13.41,4.36,5.51,0,9.35-2.18,9.35-6.03,0-4.57-5.61-6.55-11.75-8.83-6.96-2.81-12.89-5.93-12.99-13.62-.21-9.25,8.21-14.66,18.08-14.66Z"></path>

  </div>

  <div class="card">
    <div id="form-section">
      <p class="card-title">طلب توقيع الاتفاقية</p>
      <p class="card-desc">يرجى تعبئة بياناتك أدناه وسيتواصل معك فريقنا في أقرب وقت.</p>
      <hr class="divider">

      <div class="field">
        <label>اسم الشركة / المؤسسة <span class="required">*</span></label>
        <input type="text" id="company" placeholder="مثال: مؤسسة النجمة التجارية">
      </div>
      <div class="field">
        <label>رقم السجل التجاري <span class="required">*</span></label>
        <input type="text" id="cr" placeholder="10 أرقام" maxlength="10" inputmode="numeric">
        <div class="field-note">أدخل رقم السجل التجاري المكوّن من 10 أرقام</div>
      </div>
      <div class="field">
        <label>رقم الجوال <span class="required">*</span></label>
        <input type="tel" id="phone" placeholder="05XXXXXXXX" maxlength="10" inputmode="numeric">
      </div>
      <div class="field">
        <label>اسم صاحب الصلاحية (المفوّض) <span class="required">*</span></label>
        <input type="text" id="auth" placeholder="الاسم الكامل كما في الهوية">
      </div>

      <button class="btn" id="submit-btn" onclick="submitForm()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        <span id="btn-text">إرسال الطلب</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

    <div class="success" id="success-section">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3>تم استلام طلبك ✓</h3>
      <p>شكراً لك،<br>سيتواصل معك فريق قسيمة بلس في أقرب وقت<br>لإتمام إجراءات توقيع الاتفاقية.</p>
    </div>
  </div>

</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztHLeukWAPTG-BMloCFV00qy0RTSSranJeMsRftjupdBPvi7EvtOBPAkQT5iVsb7bJhw/exec";

  function submitForm() {
    const company = document.getElementById('company').value.trim();
    const cr      = document.getElementById('cr').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const auth    = document.getElementById('auth').value.trim();

    let valid = true;
    ['company','cr','phone','auth'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('error'); valid = false; }
      else el.classList.remove('error');
    });
    if (!valid) { alert('يرجى تعبئة جميع الحقول'); return; }
    if (cr.length !== 10 || isNaN(cr)) { alert('رقم السجل التجاري يجب أن يكون 10 أرقام'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = 'جارٍ الإرسال...';
    document.getElementById('spinner').style.display = 'block';

    const payload = {
      company, cr, phone, auth,
      timestamp: new Date().toLocaleString('ar-SA')
    };

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => showSuccess())
    .catch(() => showSuccess());
  }

  function showSuccess() {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  }

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => el.classList.remove('error'));
  });
</script>
